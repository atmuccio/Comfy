name: Discord Notifications

on:
  pull_request:
    types: [opened, closed]
  issues:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: PR Notification
        if: github.event_name == 'pull_request'
        run: |
          if [ "${{ github.event.action }}" = "opened" ]; then
            COLOR=3447003
            TITLE="Pull Request Opened"
          else
            if [ "${{ github.event.pull_request.merged }}" = "true" ]; then
              COLOR=3066993
              TITLE="Pull Request Merged"
            else
              COLOR=15158332
              TITLE="Pull Request Closed"
            fi
          fi

          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"$TITLE\",
              \"description\": \"${{ github.event.pull_request.title }}\",
              \"color\": $COLOR,
              \"fields\": [
                {\"name\": \"Author\", \"value\": \"${{ github.event.pull_request.user.login }}\", \"inline\": true},
                {\"name\": \"Number\", \"value\": \"#${{ github.event.pull_request.number }}\", \"inline\": true}
              ],
              \"url\": \"${{ github.event.pull_request.html_url }}\",
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "${{ secrets.DISCORD_WEBHOOK }}"

      - name: Issue Notification
        if: github.event_name == 'issues'
        run: |
          if [ "${{ github.event.action }}" = "opened" ]; then
            COLOR=3447003
            TITLE="Issue Opened"
          else
            COLOR=9807270
            TITLE="Issue Closed"
          fi

          curl -s -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"$TITLE\",
              \"description\": \"${{ github.event.issue.title }}\",
              \"color\": $COLOR,
              \"fields\": [
                {\"name\": \"Author\", \"value\": \"${{ github.event.issue.user.login }}\", \"inline\": true},
                {\"name\": \"Number\", \"value\": \"#${{ github.event.issue.number }}\", \"inline\": true}
              ],
              \"url\": \"${{ github.event.issue.html_url }}\",
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "${{ secrets.DISCORD_WEBHOOK }}"
